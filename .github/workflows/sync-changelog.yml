name: Sync Changelog

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]

concurrency:
  group: sync-changelog
  cancel-in-progress: false

jobs:
  sync:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Fetch latest release info
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(gh release list --limit 1 --json tagName --jq '.[0].tagName')
          BODY=$(gh release view "$TAG" --json body --jq '.body' | sed 's/<!--.*-->//g')
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prepend release notes to changelog.mdx
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_BODY: ${{ steps.release.outputs.body }}
        run: |
          set -euo pipefail

          VERSION="${RELEASE_TAG#v}"
          DATE=$(TZ=America/Sao_Paulo date +%Y-%m-%d)
          FILE="docs/reference/changelog.mdx"
          VERSION_HEADING="### v${VERSION}"
          DATE_HEADING="## ${DATE}"

          # Skip if this version already exists (idempotent re-runs)
          if grep -qF "${VERSION_HEADING}" "${FILE}"; then
            echo "Version ${VERSION} already in changelog, skipping."
            exit 0
          fi

          VERSION_SECTION="${VERSION_HEADING}"$'\n\n'"${RELEASE_BODY}"$'\n'

          # Find the line number of the closing --- of the frontmatter
          FRONTMATTER_END=$(awk '/^---/{count++; if(count==2){print NR; exit}}' "${FILE}")

          if grep -qF "${DATE_HEADING}" "${FILE}"; then
            # Date heading already exists — insert version section immediately after it
            DATE_LINE=$(grep -nF "${DATE_HEADING}" "${FILE}" | head -1 | cut -d: -f1)
            {
              head -n "${DATE_LINE}" "${FILE}"
              echo ""
              echo "${VERSION_SECTION}"
              tail -n +"$((DATE_LINE + 1))" "${FILE}"
            } > "${FILE}.tmp"
          else
            # New date — insert a fresh date heading + version section after frontmatter
            NEW_BLOCK="${DATE_HEADING}"$'\n\n'"${VERSION_SECTION}"
            {
              head -n "${FRONTMATTER_END}" "${FILE}"
              echo ""
              echo "${NEW_BLOCK}"
              tail -n +"$((FRONTMATTER_END + 1))" "${FILE}" | sed '/^$/{ N; /^\n$/d; }' | tail -n +2
            } > "${FILE}.tmp"
          fi
          mv "${FILE}.tmp" "${FILE}"

      - name: Format changelog
        run: bun run format docs/reference/changelog.mdx

      - name: Open changelog PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="docs/changelog-${{ steps.release.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add docs/reference/changelog.mdx
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "docs: update changelog for ${{ steps.release.outputs.tag }}"
          git push --force origin "$BRANCH"
          gh pr create \
            --title "docs: update changelog for ${{ steps.release.outputs.tag }}" \
            --body "Automated changelog update for ${{ steps.release.outputs.tag }}." \
            --base main \
            --head "$BRANCH" || true
